name: 每日知识日报
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip -q
          pip install -r scripts/requirements.txt -q

      - name: 生成日报
        run: python scripts/generate_report.py daily
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_ENABLE_SEARCH: ${{ secrets.OPENAI_ENABLE_SEARCH }}

      - name: 推送
        run: |
          git config user.name "知识库管家"
          git config user.email "bot@knowledge-base"
          git add -A
          git diff --staged --quiet || git commit -m "每日知识日报 $(date +'%Y-%m-%d')"
          git push
