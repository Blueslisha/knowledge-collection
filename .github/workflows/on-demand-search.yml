name: 专题检索
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 要检索的专题名称（如 "Mamba state space model"）
        required: true
        type: string

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip -q
          pip install -r scripts/requirements.txt -q

      - name: 生成专题报告
        run: python scripts/generate_report.py topic "${{ inputs.topic }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_ENABLE_SEARCH: ${{ secrets.OPENAI_ENABLE_SEARCH }}

      - name: 推送
        run: |
          git config user.name "知识库管家"
          git config user.email "bot@knowledge-base"
          git add -A
          git diff --staged --quiet || git commit -m "添加专题: ${{ inputs.topic }}"
          git push
